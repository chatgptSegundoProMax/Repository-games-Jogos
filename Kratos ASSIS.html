<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="KatronBot - Assistente de Eletrônica">
    <title>KatronBot - Assistente de Eletrônica</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="chat-container" role="main" aria-label="Chat com KatronBot">
        <header id="chat-header" aria-label="Cabeçalho do chat">
            <div class="brand">
                <div class="logo-box" aria-label="Logo">KB</div>
                <h1>KatronBot</h1>
            </div>
            <time id="clock" aria-label="Hora atual">00:00</time>
        </header>

        <section id="chat-window" role="log" aria-label="Histórico de mensagens" aria-live="polite">
            <article class="msg bot" role="article">
                Fala seu frágil ser Humano! Sou um meio Deus da Grécia Antiga e sou um assistente digital de Eletroeletrônica. Como eu poderia te Guiar ao caminho da VITÓRIA hoje?
            </article>
        </section>

        <div id="input-area">
            <input 
                type="text" 
                id="user-input" 
                placeholder="Escreva sua mensagem..." 
                autocomplete="off"
                aria-label="Campo de entrada de mensagem"
            >
            <button id="send-btn" aria-label="Enviar mensagem">Enviar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
